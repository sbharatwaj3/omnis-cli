name: Release CLI Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Bun ─────────────────────────────────────────────────────────
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── 4. Compile all three platform binaries ───────────────────────────────
      # Each target is a self-contained executable — no Bun runtime required
      # on the end-user's machine.  Windows cross-compilation runs on Linux
      # via Bun's built-in cross-compile support.

      - name: Compile — Windows (x64)
        run: |
          bun build --compile \
            --target=bun-windows-x64 \
            --outfile=dist/omnis-run-win.exe \
            ./index.ts

      - name: Compile — macOS (Apple Silicon)
        run: |
          bun build --compile \
            --target=bun-darwin-arm64 \
            --outfile=dist/omnis-run-mac \
            ./index.ts

      - name: Compile — Linux (x64)
        run: |
          bun build --compile \
            --target=bun-linux-x64 \
            --outfile=dist/omnis-run-linux \
            ./index.ts

      # ── 5. Verify artifacts exist before upload ───────────────────────────────
      - name: Verify compiled artifacts
        run: |
          ls -lh dist/
          test -f dist/omnis-run-win.exe || (echo "ERROR: omnis-run-win.exe missing" && exit 1)
          test -f dist/omnis-run-mac     || (echo "ERROR: omnis-run-mac missing"     && exit 1)
          test -f dist/omnis-run-linux   || (echo "ERROR: omnis-run-linux missing"   && exit 1)

      # ── 6. Publish GitHub Release with all three binaries ─────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/omnis-run-win.exe
            dist/omnis-run-mac
            dist/omnis-run-linux
